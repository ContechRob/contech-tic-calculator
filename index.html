<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CESTIC</title>
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f5f3;
  --color-text-primary:#1a1a1a;
  --color-text-secondary:#666660;
  --color-border-tertiary:rgba(0,0,0,.12);
  --color-border-secondary:rgba(0,0,0,.22);
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:#f0f2f5;min-height:100vh;padding:24px 16px}
.page-wrap{max-width:780px;margin:0 auto;background:var(--color-background-primary);border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.app{padding:0;font-family:var(--font-sans)}
.hdr{display:flex;align-items:center;gap:10px;padding-bottom:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.25rem}
.hdr-mark{width:32px;height:32px;background:#1a4a7a;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-mark span{color:#fff;font-size:10px;font-weight:600;letter-spacing:.5px}
.inp-ct input,.inp-ct select,.inp-ct textarea{background-color:#EBF4FD !important;border-color:#7CB9E8 !important;}
.inp-cp input,.inp-cp select,.inp-cp textarea{background-color:#FFFCE6 !important;border-color:#D4B94A !important;}
.inp-ct .backfill-subtotal,.inp-ct .rate-derived{color:#185FA5}
.inp-cp .backfill-subtotal,.inp-cp .rate-derived{color:#7a6a10}
.hdr-sub{font-size:12px;color:var(--color-text-secondary);margin-top:1px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.card.ac{border-color:#1a4a7a}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.sn{width:20px;height:20px;border-radius:50%;background:#1a4a7a;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.st{font-size:13px;font-weight:600;color:var(--color-text-primary)}
.ss{font-size:11px;color:var(--color-text-secondary)}
.lbl{font-size:11px;font-weight:600;color:var(--color-text-secondary);margin-bottom:4px;letter-spacing:.2px}
select,input[type=text],input[type=number]{width:100%;height:34px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:0 10px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
select:focus,input:focus{outline:none;border-color:#1a4a7a;box-shadow:0 0 0 2px rgba(26,74,122,.1)}
select.err,input.err{border-color:#E24B4A}
.product-tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.tile{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:11px 8px;cursor:pointer;text-align:center;background:var(--color-background-primary);transition:all .15s;display:flex;align-items:center;justify-content:center}
.tile:hover{border-color:#1a4a7a;background:#f0f5fa}
.tile.sel{border-color:#1a4a7a;background:#E6F1FB;border-width:1.5px}
.tile-name{font-size:13px;font-weight:600;color:var(--color-text-primary)}
.tile.sel .tile-name{color:#0C447C}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col-hdr{display:flex;align-items:center;gap:6px;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.col-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;flex-shrink:0}
.badge-ct{background:#E6F1FB;color:#0C447C}
.badge-cp{background:#F1EFE8;color:#444441}
.col-title{font-size:12px;font-weight:600;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.dots{display:flex;gap:5px;flex-wrap:wrap;max-width:140px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--color-border-secondary)}
.dot.on{background:#1a4a7a}
.btn{height:34px;padding:0 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;font-weight:600;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);transition:all .15s;font-family:var(--font-sans)}
.btn:hover{border-color:#1a4a7a;color:#1a4a7a}
.btn.pri{background:#1a4a7a;color:#fff;border-color:#1a4a7a}
.btn.pri:hover{opacity:.9}
.btn.full{width:100%;height:38px;margin-top:1rem}
.btn-pdf{height:34px;padding:0 16px;border:0.5px solid #1a4a7a;border-radius:var(--border-radius-md);font-size:13px;font-weight:600;cursor:pointer;background:#1a4a7a;color:#fff;display:flex;align-items:center;gap:7px;transition:opacity .15s;font-family:var(--font-sans)}
.btn-pdf:hover{opacity:.88}
.err-msg{font-size:11px;color:#A32D2D;margin-top:4px;display:none}
.ref-panel{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-top:10px;border:0.5px solid var(--color-border-tertiary)}
.ref-title{font-size:11px;font-weight:600;color:var(--color-text-secondary);margin-bottom:8px}
.ref-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ref-item{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:7px 9px;cursor:pointer;transition:all .15s}
.ref-item:hover{border-color:#1a4a7a}
.ref-item.on{border-color:#1a4a7a;background:#E6F1FB}
.ref-name{font-size:11px;font-weight:600;color:var(--color-text-primary)}
.ref-item.on .ref-name{color:#0C447C}
.ref-range{font-size:10px;color:var(--color-text-secondary);margin-top:1px}
.ref-note{font-size:10px;color:var(--color-text-secondary);margin-top:8px;line-height:1.5}
.install-ref-panel{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-top:10px;border:0.5px solid var(--color-border-tertiary)}
.install-ref-title{font-size:11px;font-weight:600;color:var(--color-text-secondary);margin-bottom:8px}
.install-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:0.5px solid var(--color-border-secondary);border-radius:20px;cursor:pointer;background:var(--color-background-primary);transition:all .15s}
.chip:hover{border-color:#1a4a7a;background:#f0f5fa}
.chip.sel{border-color:#1a4a7a;background:#E6F1FB}
.chip-lbl{font-size:11px;font-weight:600;color:var(--color-text-primary)}
.chip.sel .chip-lbl{color:#0C447C}
.chip-range{font-size:10px;color:var(--color-text-secondary)}
.chip.sel .chip-range{color:#185FA5}
.install-detail{margin-top:10px;padding:9px 11px;background:var(--color-background-primary);border:0.5px solid #B5D4F4;border-radius:var(--border-radius-md);font-size:11px;color:var(--color-text-secondary);line-height:1.5;display:none}
.install-detail.show{display:block}
.install-detail strong{font-weight:600;color:#0C447C}
.rate-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.rate-derived{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;margin-top:6px;display:flex;align-items:baseline;gap:6px;min-height:36px}
.rate-val{font-size:18px;font-weight:600;color:#0C447C}
.rate-unit{font-size:11px;color:var(--color-text-secondary)}
.eq.on .eq.on.cp-on .eq.on .info{font-size:11px;color:var(--color-text-secondary);background:var(--color-background-secondary);padding:7px 9px;border-radius:var(--border-radius-md);margin-top:8px}
.tip-wrap{position:relative;display:inline-flex;align-items:center}
.tip-bulb{width:26px;height:26px;border-radius:50%;background:#FFF8DC;border:1px solid #E0C94F;display:inline-flex;align-items:center;justify-content:center;font-size:14px;cursor:help;user-select:none;flex-shrink:0}
.tip-bulb:hover{background:#FFF3B8}
.tip-pop{position:absolute;bottom:calc(100% + 8px);right:0;width:min(330px,82vw);background:#2b2b2b;color:#fff;font-size:11px;line-height:1.55;padding:10px 13px;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.28);opacity:0;visibility:hidden;transition:opacity .15s;z-index:200;pointer-events:none}
.tip-pop.left{right:auto;left:0}
.tip-wrap:hover .tip-pop,.tip-bulb:focus~.tip-pop{opacity:1;visibility:visible}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:1rem 0}
.jb-card{background:var(--color-background-primary);border:0.5px solid #9FE1CB;border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.jb-header-strip{background:#E1F5EE;border-radius:var(--border-radius-md);padding:8px 12px;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.jb-icon{width:18px;height:18px;background:#1D9E75;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.jb-icon-inner{width:8px;height:8px;border:2px solid #fff;border-radius:1px}
.jb-header-txt{font-size:12px;font-weight:600;color:#085041}
.jb-header-sub{font-size:11px;color:#0F6E56;margin-top:1px}
.jb-two{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.jb-col{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;border:0.5px solid var(--color-border-tertiary)}
.jb-col.ct-side{background:#E1F5EE;border-color:#9FE1CB}
.jb-col-name{font-size:11px;font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid rgba(0,0,0,.07)}
.jb-col.ct-side .jb-col-name{color:#085041}
.jb-field{margin-bottom:8px}
.jb-total{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0 0;margin-top:4px;border-top:0.5px solid rgba(0,0,0,.08);font-size:13px;font-weight:600}
.jb-total.ct-tot{color:#085041}
.jb-savings{background:#E1F5EE;border:0.5px solid #9FE1CB;border-radius:var(--border-radius-md);padding:8px 12px;font-size:12px;color:#085041;display:none}
.jb-savings.show{display:flex;align-items:center;justify-content:space-between}
.jb-savings-badge{background:#0F6E56;color:#E1F5EE;font-size:11px;font-weight:600;padding:3px 8px;border-radius:3px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.sum-col{border-radius:var(--border-radius-md);padding:12px;border:0.5px solid var(--color-border-tertiary)}
.sum-col.ct-col{background:#E6F1FB;border-color:#B5D4F4}
.sum-col.cp-col{background:var(--color-background-secondary)}
.sum-col-name{font-size:12px;font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid rgba(0,0,0,.07)}
.sum-row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;font-size:12px}
.sum-lbl{color:var(--color-text-secondary)}
.sum-val{font-weight:600;color:var(--color-text-primary)}
.sum-total{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0 0;margin-top:6px;border-top:1.5px solid rgba(0,0,0,.15);font-size:15px;font-weight:700}
.win-val{color:#0C447C}
.lose-val{color:#A32D2D}
.winner-banner{border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:10px}
.wbn-ct{background:#E6F1FB;border:0.5px solid #B5D4F4}
.wbn-cp{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)}
.wbn-eq{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)}
.winner-txt{font-size:13px;font-weight:600;color:#0C447C}
.winner-sub{font-size:11px;color:#185FA5;margin-top:2px}
.wbn-cp .winner-txt,.wbn-eq .winner-txt{color:var(--color-text-primary)}
.wbn-cp .winner-sub,.wbn-eq .winner-sub{color:var(--color-text-secondary)}
.savings-badge{background:#0C447C;color:#E6F1FB;font-size:12px;font-weight:600;padding:4px 10px;border-radius:var(--border-radius-md);white-space:nowrap;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px}
.stat-lbl{font-size:10px;color:var(--color-text-secondary);margin-bottom:3px}
.stat-val{font-size:16px;font-weight:600;color:var(--color-text-primary)}
.stat-unit{font-size:10px;color:var(--color-text-secondary);margin-top:1px}
.stat.hi .stat-val{color:#0C447C}
.bars{margin:1rem 0}
.bar-row{margin-bottom:10px}
.bar-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.bar-lbl span:last-child{font-weight:600;color:var(--color-text-primary)}
.bar-track{height:7px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-ct{background:#1a4a7a}
.bar-cp{background:#B4B2A9}
.proj-totals{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.proj-tot-lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px}
.proj-tot-val{font-size:16px;font-weight:600}
.detail-tbl{width:100%;font-size:12px;border-collapse:collapse}
.detail-tbl td{padding:3px 0;vertical-align:top}
.detail-tbl td:first-child{color:var(--color-text-secondary);width:42%}
.detail-tbl td:last-child{font-weight:600;color:var(--color-text-primary)}
.jb-sum-block{background:#E1F5EE;border:0.5px solid #9FE1CB;border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:1rem}
.jb-sum-title{font-size:11px;font-weight:600;color:#085041;margin-bottom:6px}
.jb-sum-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.jb-sum-row span:first-child{color:#0F6E56}
.jb-sum-row span:last-child{font-weight:600;color:#085041}
.fit-product-block{margin-bottom:14px}
.fit-product-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid var(--color-border-tertiary)}
.fit-col-title{font-size:12px;font-weight:600;color:var(--color-text-primary)}
.fit-item{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;margin-bottom:6px;background:var(--color-background-primary)}
.fit-item.on{border-color:#1a4a7a;background:#F7FAFD}
.fit-item-top{display:flex;align-items:center;gap:8px;cursor:pointer}
.fit-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--color-border-secondary);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.fit-item.on .fit-chk{background:#1a4a7a;border-color:#1a4a7a}
.fit-chk-inner{width:4px;height:7px;border-right:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(45deg) translate(-1px,-1px);display:none}
.fit-item.on .fit-chk-inner{display:block}
.fit-lbl{font-size:12px;color:var(--color-text-primary);flex:1}
.fit-default{font-size:10px;color:var(--color-text-secondary)}
.fit-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--color-border-tertiary)}
.fit-totals{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;margin-top:4px;display:flex;justify-content:space-between;font-size:11px}
.fit-totals strong{color:var(--color-text-primary);font-weight:600}
.jb-elim-note{font-size:11px;color:#0F6E56;background:#F0FAF6;border:0.5px solid #BFE0C6;border-radius:var(--border-radius-md);padding:8px 10px;margin-top:8px;line-height:1.5}
.action-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;align-items:center}
.carbon-block{background:#EEF6F0;border:0.5px solid #BFE0C6;border-radius:var(--border-radius-md);padding:12px 14px;margin-bottom:1rem}
.carbon-title-row{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.carbon-leaf{width:16px;height:16px;background:#3A8255;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.carbon-title{font-size:12px;font-weight:600;color:#235236}
.carbon-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.carbon-col{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:10px;border:0.5px solid var(--color-border-tertiary)}
.carbon-col.lower{border-color:#8FCB9D;background:#F5FBF6}
.carbon-col-name{font-size:11px;font-weight:600;color:var(--color-text-primary);margin-bottom:6px}
.carbon-val-row{display:flex;align-items:baseline;gap:5px;margin-bottom:2px}
.carbon-val{font-size:17px;font-weight:600;color:#235236}
.carbon-rank{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;display:inline-block;margin-top:4px}
.carbon-rank.lower-r{background:#DCEFE0;color:#235236}
.carbon-rank.higher-r{background:#F1EFE8;color:#5c5c54}
.carbon-why{font-size:11px;color:#3a5740;line-height:1.5;margin-bottom:8px}
.carbon-eol-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.carbon-eol-col{font-size:10px;color:#3a5740;line-height:1.5;background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:8px 10px;border:0.5px solid var(--color-border-tertiary)}
.carbon-eol-col strong{display:block;font-size:10px;font-weight:600;color:var(--color-text-primary);margin-bottom:2px}
.rebar-toggle{display:flex;align-items:center;gap:8px;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-secondary);margin-top:8px;transition:all .15s}
.rebar-toggle:hover{border-color:#1a4a7a}
.rebar-toggle.on{border-color:#1a4a7a;background:#E6F1FB}
.rebar-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--color-border-secondary);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rebar-toggle.on .rebar-chk{background:#1a4a7a;border-color:#1a4a7a}
.rebar-chk-inner{width:4px;height:7px;border-right:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(45deg) translate(-1px,-1px);display:none}
.rebar-toggle.on .rebar-chk-inner{display:block}
.rebar-lbl{font-size:11px;color:var(--color-text-primary);flex:1}
.rebar-cost-input{margin-top:8px}
.backfill-subtotal{font-size:11px;color:var(--color-text-secondary);margin-top:8px;text-align:right}
.backfill-subtotal strong{color:var(--color-text-primary);font-weight:600}
.diam-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;align-items:end}
.diam-mini-lbl{font-size:9px;color:var(--color-text-secondary);margin-bottom:3px}
.diam-totals{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;margin-top:8px;display:flex;justify-content:space-between;font-size:11px;flex-wrap:wrap;gap:6px}
.diam-totals strong{color:var(--color-text-primary);font-weight:600}
.diam-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.diam-tbl th{text-align:left;padding:5px 6px;color:var(--color-text-secondary);font-weight:600;border-bottom:0.5px solid var(--color-border-tertiary);font-size:10px}
.diam-tbl td{padding:5px 6px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
.diam-tbl tr:last-child td{border-bottom:none}
.diam-section-lbl{font-size:11px;font-weight:600;color:var(--color-text-primary);margin:10px 0 6px}
.btn-copy{height:28px;padding:0 12px;border:0.5px solid #1a4a7a;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:#E6F1FB;color:#0C447C;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s;font-family:var(--font-sans)}
.btn-copy:hover{background:#1a4a7a;color:#fff}
.disclaimer-block{margin-top:1rem;padding:10px 12px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:10px;color:var(--color-text-secondary);line-height:1.6}
.disclaimer-title{font-size:11px;font-weight:600;color:var(--color-text-primary);margin-bottom:4px}

  <div class="g-step"><div class="g-sn">5</div><div><div class="g-h3">Excavation &amp; trenching rate</div>
  Enter the contractor&rsquo;s excavation rate in <b>$/CY</b> for each product. Volume comes automatically from the per-line trench geometry &times; footage. Regional benchmark chips are provided if you need a starting point.</div></div>

  <div class="g-step"><div class="g-sn">6</div><div><div class="g-h3">Backfill</div>
  Choose the backfill type and enter material cost in <b>$/CY</b> per product. Backfill volume = excavated volume minus the pipe/box open area. If reinforced concrete encasement with rebar is selected, the rebar $/LF is added on top.</div></div>

  <div class="g-step"><div class="g-sn">7</div><div><div class="g-h3">Installation &amp; daily overhead</div>
  Enter each crew&rsquo;s production rate in <b>LF/day</b> and one <b>daily overhead rate</b> ($/day: crew wages, equipment rental, traffic control, site overhead). Install duration = LF &divide; rate. Fewer days &times; daily overhead is often the largest hidden saving.</div></div>

  <div class="g-step"><div class="g-sn">8</div><div><div class="g-h3">Junction boxes &amp; fittings <span style="font-weight:400;color:#666">(storm sewer only)</span></div>
  Toggle the structures each design needs, set quantity and unit cost. Fitting names follow your selected Contech product.</div></div>

  <div class="g-step"><div class="g-sn">9</div><div><div class="g-h3">Summary &amp; outputs</div>
  The summary leads with the savings headline, blended $/LF, install-time cards, and side-by-side cost breakdowns, followed by material-by-diameter, the trench excavation summary (CY quantities and costs a contractor can verify), and project details. From the action row you can:
  <ul>
  <li><b>Print / Save as PDF</b> &mdash; client-ready summary document</li>
  <li><b>Export Contractor Form</b> &mdash; landscape worksheet pre-filled with every assumption for the contractor to confirm or correct</li>
  <li><b>Save Estimate</b> &mdash; see below</li>
  </ul></div></div>

  <div class="g-h2">Saving &amp; loading estimates</div>
  <p><b>Save:</b> On the summary page, click the purple <b>Save Estimate</b> button. A dialog suggests a standardized file name (date &ndash; project &ndash; location &ndash; products); accept or edit it, then <b>Download &amp; Save</b>. This downloads a <b>.json</b> file <i>and</i> keeps a copy in your browser.</p>
  <p><b>Load:</b> On the first screen, recent saves from this browser appear at the top with one-click <b>Load</b>. To restore a downloaded file (or one a colleague emailed you), click <b>Load estimate from file</b> and pick the .json. Everything is restored &mdash; products, line items, trench inputs, rates &mdash; and you land on the cost inputs ready to adjust and re-run.</p>
  <div class="g-tip"><b>&#128161; Tip:</b> Browser saves live only on that device and are trimmed to the 10 most recent &mdash; the downloaded .json file is the permanent record. Save one per revision (v1, v2&hellip;) into the project folder.</div>

  <div class="g-pbx">
  <div class="g-h2">Special section: comparing against Precast Box</div>
  <ol>
  <li>In Step 1, type <b>Precast Box</b> as the competitor product name (e.g. &ldquo;Precast Box&rdquo; or &ldquo;Rinker Precast Box&rdquo;).</li>
  <li>A yellow banner confirms box mode. <b>Box dimensions are required for every line item</b> &mdash; each line can be a different box size.</li>
  <li>Expand each trench line card. In the competitor column, fill the yellow <b>Box opening dimensions</b>: inside <b>span</b> and <b>rise</b> in feet.</li>
  <li>Confirm the <b>section thicknesses</b>: wall, top slab, and bottom slab default to <b>6 in</b>, haunch to <b>12 in</b> &mdash; adjust to the precaster&rsquo;s cut sheet.</li>
  <li>Set <b>runs</b> (parallel barrels), spacing, bedding, working room, and cover as usual.</li>
  </ol>
  <p style="margin-bottom:0"><b>How the box math works:</b> trench width uses the outside box width (span + 2&times;wall) per run; open area = span &times; rise minus the four haunch triangles; wetted perimeter = 2&times;(span + rise). Conveyance uses concrete&rsquo;s Manning&rsquo;s n of 0.013, so the summary compares hydraulic capacity as well as installed cost.</p>
  </div>

  <div class="g-foot"><span>Contech Engineered Solutions &middot; CESTIC User&rsquo;s Guide</span><span>Rev. ${new Date().toLocaleDateString('en-US')}</span></div>
  </div>`;
}

function defaultFileName(){
  const d=new Date();
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const yy=String(d.getFullYear()).slice(-2);
  const parts=[mm+'-'+dd+'-'+yy];
  if(S.projName)parts.push(S.projName.trim());
  const loc=[S.projCity,S.projState].filter(Boolean).join(' ');
  if(loc)parts.push(loc);
  if(S.product)parts.push(S.product);
  if(S.compProduct)parts.push('vs '+S.compProduct.trim());
  return parts.join(' - ');
}
function sanitizeFileName(s){
  // File-name best practices: no reserved chars, no spaces (underscores), single separators, capped length
  return (s||'').replace(/[\/\\:*?"<>|#%&{}$!'@+=\u0000-\u001f]/g,'-')
    .replace(/\s+/g,'_').replace(/-{2,}/g,'-').replace(/_{2,}/g,'_')
    .replace(/^[_\-.]+|[_\-.]+$/g,'').substring(0,120)||'CESTIC_estimate';
}
function saveEstimate(){
  const ex=document.getElementById('save-dlg');if(ex)ex.remove();
  const dlg=document.createElement('div');
  dlg.id='save-dlg';
  dlg.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px';
  dlg.innerHTML='<div style="background:#fff;border-radius:10px;padding:20px 22px;width:min(520px,92vw);box-shadow:0 8px 40px rgba(0,0,0,.25)">'
    +'<div style="font-size:14px;font-weight:700;color:#0C3460;margin-bottom:4px">Save estimate</div>'
    +'<div style="font-size:11px;color:#666;margin-bottom:12px">Downloads a .json file you can reload later, and keeps a copy in this browser.</div>'
    +'<div style="font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Estimate name</div>'
    +'<input type="text" id="save-dlg-name" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #bbb;border-radius:6px;font-size:13px;margin-bottom:6px">'
    +'<div style="font-size:10px;color:#888;margin-bottom:14px;word-break:break-all">File: <span id="save-dlg-preview" style="font-family:monospace;color:#555"></span></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end">'
    +'<button onclick="document.getElementById(\'save-dlg\').remove()" style="padding:8px 16px;background:#fff;color:#555;border:1px solid #ccc;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Cancel</button>'
    +'<button onclick="confirmSaveEstimate()" style="padding:8px 18px;background:#6b4a9e;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">&#11015; Download &amp; Save</button>'
    +'</div></div>';
  document.body.appendChild(dlg);
  const inp=document.getElementById('save-dlg-name');
  inp.value=defaultFileName();
  const upd=()=>{const p=document.getElementById('save-dlg-preview');if(p)p.textContent=sanitizeFileName(inp.value)+'.json';};
  inp.oninput=upd;upd();
  setTimeout(()=>{inp.focus();inp.select();},50);
  inp.onkeydown=(e)=>{if(e.key==='Enter')confirmSaveEstimate();if(e.key==='Escape')dlg.remove();};
}
function confirmSaveEstimate(){
  const inp=document.getElementById('save-dlg-name');
  const name=(inp&&inp.value.trim())||defaultFileName();
  const snap={savedAt:new Date().toISOString(),name:name,app:'CESTIC',version:2,state:S};
  let fileOk=false;
  try{
    const blob=new Blob([JSON.stringify(snap,null,1)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=sanitizeFileName(name)+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    fileOk=true;
  }catch(e){alert('File download failed: '+e.message);}
  try{
    const saves=JSON.parse(localStorage.getItem(LS_KEY)||'[]');
    saves.unshift(snap);
    localStorage.setItem(LS_KEY,JSON.stringify(saves.slice(0,10)));
  }catch(e){}
  const dlg=document.getElementById('save-dlg');if(dlg)dlg.remove();
  const btn=document.getElementById('save-est-btn');
  if(btn&&fileOk){const orig=btn.innerHTML;btn.innerHTML='&#10003; Saved';setTimeout(()=>{btn.innerHTML=orig;},2500);}
}
function applyLoadedSnap(snap){
  if(!snap||!snap.state){alert('That file is not a valid CESTIC estimate.');return;}
  mergeState(snap.state);
  if(S.product&&S.appType){showView('costs');rCosts();}
  else{showView('product');rProduct();}
}
function handleLoadFile(input){
  const f=input.files&&input.files[0];
  if(!f)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{applyLoadedSnap(JSON.parse(reader.result));}
    catch(e){alert('Could not read that file: '+e.message);}
  };
  reader.readAsText(f);
  input.value='';
}
function localSaves(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){return[];}}
function loadLocalSave(i){const s=localSaves()[i];if(s)applyLoadedSnap(s);}
function deleteLocalSave(i){
  const saves=localSaves();saves.splice(i,1);
  try{localStorage.setItem(LS_KEY,JSON.stringify(saves));}catch(e){}
  rProduct();
}

    ${rows}
    <div style="margin-top:8px">${fileRow}</div>
  </div>`;
}

function showView(v){['product','context','costs','jbox','results'].forEach(n=>document.getElementById('v-'+n).style.display=n===v?'block':'none');}
function isStormSewer(){return S.appType==='Storm sewer';}
function isPrecastBox(){return (S.compProduct||'').toLowerCase().includes('precast box');}

function parseDiamInch(s){const m=(s||'').toString().match(/[\d.]+/);return m?parseFloat(m[0]):0;}

function defaultBeddingCt(){const p=S.product;if(p==='CMP'||p==='Ultra-Flo'||p==='DuroMaxx')return 6;return 12;}
function defaultCoverCt(){const p=S.product;if(p==='DuroMaxx')return 2;if(p==='CMP'||p==='Ultra-Flo')return 1;return 0;}
function defaultBeddingCp(){return isHdpeName((S.compProduct||'')+' '+(S.compName||''))?6:12;}
function defaultCoverCp(){return isHdpeName((S.compProduct||'')+' '+(S.compName||''))?2:0;}
function effBeddingCt(ln){return ln.cmpBedding==null?defaultBeddingCt():+ln.cmpBedding;}
function effCoverCt(ln){return ln.cmpCover==null?defaultCoverCt():+ln.cmpCover;}
function effBeddingCp(ln){return ln.cpBedding==null?defaultBeddingCp():+ln.cpBedding;}
function effCoverCp(ln){return ln.cpCover==null?defaultCoverCp():+ln.cpCover;}
function cmpTrenchLine(i){
  const ln=S.rcbLines[i],dFt=parseDiamInch(S.diam.ct[i]?.d)/12;
  const barrels=Math.max(1,+(ln.cmpBarrels||1));
  const trenchW=barrels*dFt+(barrels-1)*(+(ln.cmpSpacing||0)/12)+2*(+(ln.cmpWorkRoom||0)/12);
  const trenchH=dFt+effBeddingCt(ln)/12+effCoverCt(ln);
  const openPerBarrel=Math.PI*Math.pow(dFt/2,2);
  const totalOpen=openPerBarrel*barrels;
  const wettedPerim=Math.PI*dFt;
  const hydraulicRadius=wettedPerim>0?openPerBarrel/wettedPerim:0;
  const manN=+(ln.ctManning||0)||manningDefaultCt();
  const conveyance=manN>0&&hydraulicRadius>0?(1.486/manN)*totalOpen*Math.pow(hydraulicRadius,2/3):0;
  return{dFt,trenchW,trenchH,excav:trenchW*trenchH,openPerBarrel,totalOpen,wettedPerim,hydraulicRadius,manN,conveyance};
}
function compPipeTrenchLine(i){
  const ln=S.rcbLines[i],dFt=parseDiamInch(S.diam.cp[i]?.d)/12;
  const barrels=Math.max(1,+(ln.cpBarrels||1));
  const trenchW=barrels*dFt+(barrels-1)*(+(ln.cpSpacing||0)/12)+2*(+(ln.cpWorkRoom||0)/12);
  const trenchH=dFt+effBeddingCp(ln)/12+effCoverCp(ln);
  const openPerBarrel=Math.PI*Math.pow(dFt/2,2);
  const totalOpen=openPerBarrel*barrels;
  const wettedPerim=Math.PI*dFt;
  const hydraulicRadius=wettedPerim>0?openPerBarrel/wettedPerim:0;
  const manN=+(ln.cpManning||0)||manningDefaultCp();
  const conveyance=manN>0&&hydraulicRadius>0?(1.486/manN)*totalOpen*Math.pow(hydraulicRadius,2/3):0;
  return{dFt,trenchW,trenchH,excav:trenchW*trenchH,openPerBarrel,totalOpen,wettedPerim,hydraulicRadius,manN,conveyance};
}
function rcbTrenchLine(i){
  const ln=S.rcbLines[i];
  // Per-line box dimensions (fall back to global S.rcb if line-level not set)
  const span=+(ln.span)||+(S.rcb.span||0);
  const rise=+(ln.rise)||+(S.rcb.rise||0);
  const wall=+(ln.wall)||6;
  const topSlab=+(ln.topSlab)||6;
  const botSlab=+(ln.botSlab)||6;
  const haunch=+(ln.haunch)||12;
  const runs=Math.max(1,+(ln.runs||1));
  const outerW=span+2*(wall/12);
  const outerH=rise+(topSlab+botSlab)/12;
  const trenchW=runs*outerW+Math.max(0,runs-1)*(+(ln.runSpacing||0)/12)+2*(+(ln.workRoom||0)/12);
  const trenchH=outerH+(+(ln.bedding||0)/12)+(+(ln.rcbCover||0));
  const haunchFt=haunch/12;
  const haunchDeduct=4*(Math.sqrt(3)/4)*haunchFt*haunchFt;
  const openPerBarrel=Math.max(0,span*rise-haunchDeduct);
  const totalOpen=openPerBarrel*runs;
  const wettedPerim=2*(span+rise);
  const hydraulicRadius=wettedPerim>0?openPerBarrel/wettedPerim:0;
  const manN=+(ln.cpManning||0)||manningDefaultCp();
  const conveyance=manN>0&&hydraulicRadius>0?(1.486/manN)*totalOpen*Math.pow(hydraulicRadius,2/3):0;
  return{outerW,outerH,trenchW,trenchH,excav:trenchW*trenchH,openPerBarrel,totalOpen,wettedPerim,hydraulicRadius,manN,conveyance};
}
function cpTrenchLine(i){return isPrecastBox()?rcbTrenchLine(i):compPipeTrenchLine(i);}
function activeLines(){return Array.from({length:15},(_,i)=>i).filter(i=>(S.diam.ct[i]?.d||S.diam.ct[i]?.lf||S.diam.cp[i]?.d||S.diam.cp[i]?.lf));}

// Per-line excavation / backfill in CY (using Section 3 LF)
function excavationCYLine(i,side){
  const lf=side==='ct'?(S.diam.ct[i]?.lf||0):(S.diam.cp[i]?.lf||0);
  if(!lf)return 0;
  return(side==='ct'?cmpTrenchLine(i):cpTrenchLine(i)).excav*lf/27;
}
function backfillCYLine(i,side){
  const lf=side==='ct'?(S.diam.ct[i]?.lf||0):(S.diam.cp[i]?.lf||0);
  if(!lf)return 0;
  const c=side==='ct'?cmpTrenchLine(i):cpTrenchLine(i);
  return Math.max(0,(c.excav-c.totalOpen)*lf/27);
}

// Replace aggregate functions (previously used S.rcb single comparison)
function excavationCY(side){return activeLines().reduce((s,i)=>s+excavationCYLine(i,side),0);}
function backfillCY(side){return activeLines().reduce((s,i)=>s+backfillCYLine(i,side),0);}

function manningDefaultCp(){
  if(isPrecastBox())return MANNING_N.box;
  const name=(S.compProduct+' '+S.compName).toLowerCase();
  if(name.includes('hdpe')||name.includes('polyethylene')||name.includes('n-12')||name.includes('n12'))return MANNING_N.hdpe;
  if(name.includes('rcp')||name.includes('reinforced concrete')||name.includes(' rcb')||name.includes('precast'))return MANNING_N.rcp;
  if(name.includes('steel')||name.includes('csp')||name.includes('corrugated metal'))return MANNING_N.steel;
  if(name.includes('pvc')||name.includes('vinyl'))return MANNING_N.PVC;
  return MANNING_N.default;
}

function rcbTrench(){
  const r=S.rcb;
  const outerW=+(r.span||0)+2*(+(r.wall||0)/12);
  const outerH=+(r.rise||0)+(+(r.topSlab||0) + +(r.botSlab||0))/12;
  const trenchW=+(r.runs||1)*outerW+(Math.max(0,+(r.runs||1)-1))*(+(r.runSpacing||0)/12)+2*(+(r.workRoom||0)/12);
  const cover=+(r.rcbCover||0);
  const trenchH=outerH+(+(r.bedding||0)/12)+cover;
  const haunchFt=+(r.haunch||0)/12;
  const haunchDeduct=4*(Math.sqrt(3)/4)*haunchFt*haunchFt;
  const openPerBarrel=Math.max(0,(+(r.span||0))*(+(r.rise||0))-haunchDeduct);
  const totalOpen=openPerBarrel*Math.max(1,+(r.runs||1));
  // Hydraulic: wetted perimeter = 2×(span+rise) per run (closed conduit full flow)
  const wettedPerim=2*(+(r.span||0) + +(r.rise||0));
  const hydraulicRadius=wettedPerim>0?openPerBarrel/wettedPerim:0;
  const manN=+(r.cpManning||0)||manningDefaultCp();
  // Conveyance K = (1.486/n) × A_total × R^(2/3)  [A_total = openPerBarrel × runs]
  const conveyance=manN>0&&hydraulicRadius>0?(1.486/manN)*totalOpen*Math.pow(hydraulicRadius,2/3):0;
  return {outerW,outerH,trenchW,trenchH,excav:trenchW*trenchH,openPerBarrel,totalOpen,haunchDeduct,wettedPerim,hydraulicRadius,manN,conveyance};
}
function cmpTrench(){
  const r=S.rcb;
  const dFt=+(r.cmpDiam||0)/12;
  const barrels=Math.max(1,+(r.cmpBarrels||1));
  const trenchW=barrels*dFt+(barrels-1)*(+(r.cmpSpacing||0)/12)+2*(+(r.cmpWorkRoom||0)/12);
  const cover=+(r.cmpCover||0);
  const trenchH=dFt+(+(r.cmpBedding||0)/12)+cover;
  const openPerBarrel=Math.PI*Math.pow(dFt/2,2);
  const totalOpen=openPerBarrel*barrels;
  // Hydraulic: wetted perimeter = π×d per barrel (full flow circle)
  const wettedPerim=Math.PI*dFt;
  const hydraulicRadius=wettedPerim>0?openPerBarrel/wettedPerim:0; // = dFt/4 for full circle
  const manN=+(r.ctManning||0)||manningDefaultCt();
  const conveyance=manN>0&&hydraulicRadius>0?(1.486/manN)*totalOpen*Math.pow(hydraulicRadius,2/3):0;
  return {dFt,trenchW,trenchH,excav:trenchW*trenchH,openPerBarrel,totalOpen,wettedPerim,hydraulicRadius,manN,conveyance};
}

function compPipeTrench(){
  const r=S.rcb;
  const dFt=+(r.cpDiam||0)/12;
  const barrels=Math.max(1,+(r.cpBarrels||1));
  const trenchW=barrels*dFt+(barrels-1)*(+(r.cpSpacing||0)/12)+2*(+(r.cpWorkRoom||0)/12);
  const cover=+(r.cpCover||0);
  const trenchH=dFt+(+(r.cpBedding||0)/12)+cover;
  const openPerBarrel=Math.PI*Math.pow(dFt/2,2);
  const totalOpen=openPerBarrel*barrels;
  const wettedPerim=Math.PI*dFt;
  const hydraulicRadius=wettedPerim>0?openPerBarrel/wettedPerim:0;
  const manN=+(r.cpManning||0)||manningDefaultCp();
  const conveyance=manN>0&&hydraulicRadius>0?(1.486/manN)*totalOpen*Math.pow(hydraulicRadius,2/3):0;
  return {dFt,trenchW,trenchH,excav:trenchW*trenchH,openPerBarrel,totalOpen,wettedPerim,hydraulicRadius,manN,conveyance};
}

// helper: which calc functions to use for left (Contech) and right (competitor) sides
function trenchCalcs(){
  // Contech always = pipe (cmpTrench uses cmpDiam/barrels/etc.)
  // Competitor = box when isPrecastBox(), otherwise compPipeTrench
  return {ctCalc:cmpTrench(), cpCalc:isPrecastBox()?rcbTrench():compPipeTrench()};
}
function jbTotal(side){return Object.entries(S.fit[side]).reduce((s,[id,v])=>s+(v.on?(v.qty||0)*(v.cost||0):0),0);}
// Returns total $ backfill cost (lump sum, not $/LF)
function backfillTotal(side){
  const rate=side==='ct'?S.backfill.ctCost:S.backfill.cpCost;
  const type=side==='ct'?S.backfill.ctType:S.backfill.cpType;
  const rebar=side==='ct'?S.backfill.ctRebar:S.backfill.cpRebar;
  const rebarCost=side==='ct'?S.backfill.ctRebarCost:S.backfill.cpRebarCost;
  const cy=backfillCY(side);
  const materialCost=(rate||0)*cy;
  const rebarLumpSum=(type==='rcc'&&rebar)?(rebarCost||0)*totalLF(side):0;
  return materialCost+rebarLumpSum;
}
// ── Spoils & haul-off ──
// Native backfill: excavated soil returns to trench → spoils = displaced (pipe/box + imported bedding) volume.
// Imported backfill types: embedment must be select material → all excavated soil is hauled off.
function spoilsBankCY(side){
  const exc=excavationCY(side);if(exc<=0)return 0;
  const type=side==='ct'?S.backfill.ctType:S.backfill.cpType;
  if(type==='native')return Math.max(0,exc-backfillCY(side));
  return exc;
}
function spoilsLooseCY(side){return spoilsBankCY(side)*(1+((+S.spoils.swell||0)/100));}
function spoilsLoads(side){const t=+S.spoils.truckCY||14;const l=spoilsLooseCY(side);return l>0?Math.ceil(l/t):0;}
function spoilsMode(){return S.spoils.mode==='cy'?'cy':'load';}
function spoilsCost(side){
  if(spoilsMode()==='cy')return spoilsLooseCY(side)*(+S.spoils.haulPerCY||0);
  return spoilsLoads(side)*(+S.spoils.haulPerLoad||0);
}
function totalLF(side){return S.diam[side].reduce((s,r)=>s+(r.lf||0),0);}
function materialTotal(side){return S.diam[side].reduce((s,r)=>s+(r.c||0)*(r.lf||0),0);}
function excavationTotal(side){
  const rate=side==='ct'?S.exc.ct:S.exc.cp;
  return (rate||0)*excavationCY(side);
}
function otherPerLF(side){
  // Excavation, backfill, installation = lump sums; equipment removed → overhead handled via daily rate
  return 0;
}

function updateSchedCost(){

function updateRcbResults(){
  const {ctCalc,cpCalc}=trenchCalcs();
  const r=S.rcb;
  const CY=27;
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val;};
  // Per-LF metrics: ct = Contech (left), cp = Competitor (right)
  set('rcbr-ctW',ctCalc.trenchW.toFixed(2));set('rcbr-ctD',ctCalc.trenchH.toFixed(2));set('rcbr-ctE',ctCalc.excav.toFixed(1));
  set('rcbr-cpW',cpCalc.trenchW.toFixed(2));set('rcbr-cpD',cpCalc.trenchH.toFixed(2));set('rcbr-cpE',cpCalc.excav.toFixed(1));
  set('rcbr-ctA',ctCalc.totalOpen.toFixed(2));set('rcbr-cpA',cpCalc.totalOpen.toFixed(2));
  // Wetted perimeter per barrel
  const setWP=(id,val,unit)=>{const el=document.getElementById(id);if(el)el.textContent=val>0?val.toFixed(2):'—';};
  setWP('rcbr-ctWP',ctCalc.wettedPerim);setWP('rcbr-cpWP',cpCalc.wettedPerim);
  // Hydraulic radius per barrel
  const setR=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val>0?val.toFixed(3):'—';};
  setR('rcbr-ctR',ctCalc.hydraulicRadius);setR('rcbr-cpR',cpCalc.hydraulicRadius);
  // Conveyance K = (1.486/n) × A_total × R^(2/3)
  const setK=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val>0?val.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1}):'—';};
  setK('rcbr-ctK',ctCalc.conveyance);setK('rcbr-cpK',cpCalc.conveyance);
  // Project totals in CY
  const ctFt=+(r.cmpFootage||0), cpFt=+(r.rcbFootage||0);
  const setTot=(id,excav,ft)=>{
    const el=document.getElementById(id);if(!el)return;
    const unit=el.nextElementSibling;
    if(ft>0){el.textContent=((excav*ft)/CY).toLocaleString('en-US',{maximumFractionDigits:1});if(unit)unit.textContent='CY';}
    else{el.textContent='—';if(unit)unit.textContent='';}
  };
  setTot('rcbr-ctTE',ctCalc.excav,ctFt);setTot('rcbr-cpTE',cpCalc.excav,cpFt);
  const setBF=(id,excav,open,ft)=>{
    const el=document.getElementById(id);if(!el)return;
    const unit=el.nextElementSibling;
    if(ft>0){const bf=Math.max(0,excav*ft-open*ft);el.textContent=(bf/CY).toLocaleString('en-US',{maximumFractionDigits:1});if(unit)unit.textContent='CY';}
    else{el.textContent='—';if(unit)unit.textContent='';}
  };
  setBF('rcbr-ctBF',ctCalc.excav,ctCalc.totalOpen,ctFt);setBF('rcbr-cpBF',cpCalc.excav,cpCalc.totalOpen,cpFt);
  // Savings banner: compare Contech vs competitor
  const savEl=document.getElementById('rcbr-savrow');
  if(savEl){
    const diff=cpCalc.excav-ctCalc.excav; // positive = competitor uses more = Contech advantage
    const cpName=isPrecastBox()?'Precast box':(S.compName||'Competitor');
    if(diff>0){savEl.style.display='flex';savEl.style.background='';savEl.style.borderColor='';
      document.getElementById('rcbr-savtxt').innerHTML=`Contech ${S.product} requires <strong style="font-weight:600">${diff.toFixed(1)} cu ft/LF less excavation</strong> than ${cpName}`;
      document.getElementById('rcbr-savbadge').textContent=`-${cpCalc.excav>0?((diff/cpCalc.excav)*100).toFixed(0):0}% excavation`;
      document.getElementById('rcbr-savbadge').style.background='';}
    else if(diff<0){savEl.style.display='flex';savEl.style.background='var(--color-background-secondary)';savEl.style.borderColor='var(--color-border-tertiary)';
      document.getElementById('rcbr-savtxt').innerHTML=`${cpName} requires ${Math.abs(diff).toFixed(1)} cu ft/LF less excavation`;
      document.getElementById('rcbr-savbadge').style.background='#555';}
    else{savEl.style.display='none';}
  }
}

      </div>
      <div class="rcb-savings-row" id="rcbr-savrow" style="display:${diff>0?'flex':'none'}">

function rcbLineCardHtml(i){
  const ln=S.rcbLines[i];
  const ct=S.diam.ct[i],cp=S.diam.cp[i];
  const ctDiam=ct?.d||'—',cpDiam=cp?.d||'—';
  const ctLFrow=ct?.lf||0,cpLFrow=cp?.lf||0;
  const ctC=cmpTrenchLine(i),cpC=cpTrenchLine(i);
  const ctExcCY=ctLFrow>0?(ctC.excav*ctLFrow/27):0;
  const cpExcCY=cpLFrow>0?(cpC.excav*cpLFrow/27):0;
  const ctBFCY=ctLFrow>0?Math.max(0,(ctC.excav-ctC.totalOpen)*ctLFrow/27):0;
  const cpBFCY=cpLFrow>0?Math.max(0,(cpC.excav-cpC.totalOpen)*cpLFrow/27):0;
  const pbx=isPrecastBox();
  const ctLabel=`Contech ${S.product||''} — ${ctDiam}`;
  const cpLabel=pbx?`${S.compName||'Competitor'} Precast Box`:`${S.compName||'Competitor'} — ${cpDiam}`;
  const collapsed=ln.collapsed;
  const fmt1=(v)=>v>0?v.toFixed(1):'—';
  const fmt2=(v)=>v>0?v.toFixed(2):'—';
  const fmt3=(v)=>v>0?v.toFixed(3):'—';
  const fmtCY=(v)=>v>0?v.toLocaleString('en-US',{maximumFractionDigits:1})+' CY':'—';
  const fmtK=(v)=>v>0?v.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1}):'—';
  const inpCt=(field,val,ph,step,handler)=>`<input type="number" min="0" step="${step}" placeholder="${ph}" value="${val||''}" oninput="S.rcbLines[${i}].${field}=${+step>=1?'+this.value||0':'this.value||0'};updateRcbLineResults(${i})" style="width:100%;border:0.5px solid var(--color-border-secondary);border-radius:4px;padding:4px 6px;font-size:13px;background:var(--color-background-secondary);color:var(--color-text-primary)">`;
  const inpCp=(field,val,ph,step)=>`<input type="number" min="0" step="${step}" placeholder="${ph}" value="${val||''}" oninput="S.rcbLines[${i}].${field}=${+step>=1?'+this.value||0':'this.value||0'};updateRcbLineResults(${i})" style="width:100%;border:0.5px solid var(--color-border-secondary);border-radius:4px;padding:4px 6px;font-size:13px;background:var(--color-background-secondary);color:var(--color-text-primary)">`;

  return `<div class="rcb-line-card" id="rcbl-${i}">
    <div class="rcb-line-hdr" onclick="toggleRcbLine(${i})" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);margin-bottom:${collapsed?'0':'6px'}">
      <div style="width:22px;height:22px;border-radius:50%;background:#1a4a7a;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:600;color:var(--color-text-primary)">Line ${i+1} &nbsp;<span style="color:#1a4a7a">${ctLabel}</span> <span style="color:var(--color-text-secondary)">vs</span> <span style="color:var(--color-text-secondary)">${cpLabel}</span></div>
        ${collapsed&&(ctC.excav>0||cpC.excav>0)?`<div style="font-size:10px;color:var(--color-text-secondary);margin-top:2px">
          Contech: ${fmt1(ctC.excav)} cu ft/LF excav · ${fmtCY(ctExcCY)} total &nbsp;|&nbsp; ${cpLabel}: ${fmt1(cpC.excav)} cu ft/LF excav · ${fmtCY(cpExcCY)} total
        </div>`:''}
      </div>
      <div id="rcblc-${i}" style="font-size:14px;color:var(--color-text-secondary);transition:transform .15s">${collapsed?'▸':'▾'}</div>
    </div>
    <div id="rcblb-${i}" style="display:${collapsed?'none':'block'};padding:12px 14px;border:0.5px solid var(--color-border-tertiary);border-top:none;border-radius:0 0 var(--border-radius-md) var(--border-radius-md);margin-bottom:8px;background:var(--color-background-primary)">
      <!-- Two-column inputs -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <!-- Contech side -->
        <div style="background:#E6F1FB;border-radius:var(--border-radius-md);padding:10px;border:0.5px solid #B5D4F4">
          <div style="font-size:10px;font-weight:700;color:#0C3460;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Contech — ${S.product||''} · ${ctDiam} dia.</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
            <div><div style="font-size:9px;color:#185FA5;font-weight:600;margin-bottom:2px">Barrels</div>${inpCt('cmpBarrels',ln.cmpBarrels,'1','1','')}</div>
            <div><div style="font-size:9px;color:#185FA5;font-weight:600;margin-bottom:2px">Barrel spacing (in)</div>${inpCt('cmpSpacing',ln.cmpSpacing,'0','1','')}</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
            <div><div style="font-size:9px;color:#185FA5;font-weight:600;margin-bottom:2px">Bedding (in)</div>${inpCt('cmpBedding',effBeddingCt(ln),String(defaultBeddingCt()),'1','')}</div>
            <div><div style="font-size:9px;color:#185FA5;font-weight:600;margin-bottom:2px">Working room/side (in)</div>${inpCt('cmpWorkRoom',ln.cmpWorkRoom,'18','1','')}</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
            <div><div style="font-size:9px;color:#185FA5;font-weight:600;margin-bottom:2px">Cover (ft)</div>${inpCt('cmpCover',effCoverCt(ln),String(defaultCoverCt()),'0.5','')}</div>
            <div><div style="font-size:9px;color:#185FA5;font-weight:600;margin-bottom:2px">Manning's n</div><input type="number" min="0.001" max="0.1" step="0.001" value="${(+(ln.ctManning||0)||manningDefaultCt()).toFixed(3)}" oninput="S.rcbLines[${i}].ctManning=+this.value||0;updateRcbLineResults(${i})" style="width:100%;border:0.5px solid #7CB9E8;border-radius:4px;padding:4px 6px;font-size:13px;background:#fff;color:#0C3460"></div>

        </div>
        <!-- Competitor side -->
        <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;border:0.5px solid var(--color-border-secondary)">

            <div style="font-size:8px;font-weight:700;color:#7a6800;text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px">⚠ Box opening dimensions — required for this line</div>

              <div><div style="font-size:9px;color:#7a6800;font-weight:600;margin-bottom:2px">Rise (ft)</div>${inpCp('rise',ln.rise,'e.g. 6','0.5')}</div>
            </div>
            <div style="font-size:8px;font-weight:700;color:#7a6800;text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px">Section thicknesses</div>

              <div><div style="font-size:9px;color:#7a6800;font-weight:600;margin-bottom:2px">Wall (in)</div>${inpCp('wall',ln.wall||6,'6','1')}</div>
              <div><div style="font-size:9px;color:#7a6800;font-weight:600;margin-bottom:2px">Top slab (in)</div>${inpCp('topSlab',ln.topSlab||6,'6','1')}</div>
              <div><div style="font-size:9px;color:#7a6800;font-weight:600;margin-bottom:2px">Bot slab (in)</div>${inpCp('botSlab',ln.botSlab||6,'6','1')}</div>
              <div><div style="font-size:9px;color:#7a6800;font-weight:600;margin-bottom:2px">Haunch (in)</div>${inpCp('haunch',ln.haunch||12,'12','1')}</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
            <div><div style="font-size:9px;color:var(--color-text-secondary);font-weight:600;margin-bottom:2px">Runs</div>${inpCp('runs',ln.runs,'1','1')}</div>
            <div><div style="font-size:9px;color:var(--color-text-secondary);font-weight:600;margin-bottom:2px">Run spacing (in)</div>${inpCp('runSpacing',ln.runSpacing,'0','1')}</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
            <div><div style="font-size:9px;color:var(--color-text-secondary);font-weight:600;margin-bottom:2px">Bedding (in)</div>${inpCp('bedding',ln.bedding,'12','1')}</div>
            <div><div style="font-size:9px;color:var(--color-text-secondary);font-weight:600;margin-bottom:2px">Working room/side (in)</div>${inpCp('workRoom',ln.workRoom,'18','1')}</div>

function updateRcbLineResults(i){
  const ct=cmpTrenchLine(i),cp=cpTrenchLine(i);
  const ctLF=S.diam.ct[i]?.lf||0,cpLF=S.diam.cp[i]?.lf||0;
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  const f1=v=>v>0?v.toFixed(1):'—',f2=v=>v>0?v.toFixed(2):'—',f3=v=>v>0?v.toFixed(3):'—';
  const fK=v=>v>0?v.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1}):'—';
  const fCY=v=>v>0?v.toLocaleString('en-US',{maximumFractionDigits:1})+' CY':'—';
  set(`rcblr-ctW-${i}`,f2(ct.trenchW));set(`rcblr-cpW-${i}`,f2(cp.trenchW));
  set(`rcblr-ctD-${i}`,f2(ct.trenchH));set(`rcblr-cpD-${i}`,f2(cp.trenchH));
  set(`rcblr-ctE-${i}`,f1(ct.excav));set(`rcblr-cpE-${i}`,f1(cp.excav));
  set(`rcblr-ctA-${i}`,f2(ct.totalOpen));set(`rcblr-cpA-${i}`,f2(cp.totalOpen));
  set(`rcblr-ctWP-${i}`,f2(ct.wettedPerim));set(`rcblr-cpWP-${i}`,f2(cp.wettedPerim));
  set(`rcblr-ctR-${i}`,f3(ct.hydraulicRadius));set(`rcblr-cpR-${i}`,f3(cp.hydraulicRadius));
  set(`rcblr-ctK-${i}`,fK(ct.conveyance));set(`rcblr-cpK-${i}`,fK(cp.conveyance));
  if(ctLF>0||cpLF>0){
    const ctXCY=ctLF>0?ct.excav*ctLF/27:0,cpXCY=cpLF>0?cp.excav*cpLF/27:0;
    const ctBCY=ctLF>0?Math.max(0,(ct.excav-ct.totalOpen)*ctLF/27):0,cpBCY=cpLF>0?Math.max(0,(cp.excav-cp.totalOpen)*cpLF/27):0;
    set(`rcblr-ctXCY-${i}`,fCY(ctXCY));set(`rcblr-cpXCY-${i}`,fCY(cpXCY));
    set(`rcblr-ctBCY-${i}`,fCY(ctBCY));set(`rcblr-cpBCY-${i}`,fCY(cpBCY));
  }
}

function spoilsPrevHtml(side){

    return `<strong>${bank.toLocaleString('en-US',{maximumFractionDigits:0})} CY</strong> bank &rarr; ${loose.toLocaleString('en-US',{maximumFractionDigits:0})} CY loose${cost>0?` &rarr; <strong>$${cost.toLocaleString('en-US',{maximumFractionDigits:0})}</strong>`:''}`;

function fitBlockHtml(side){

function toggleFit(side,id){
  S.fit[side][id].on=!S.fit[side][id].on;
  rJBox();
}

function updateFitTotals(){
  ['ct','cp'].forEach(side=>{
    const el=document.getElementById('fittot-'+side);
    if(el)el.innerHTML=`Structures subtotal: <strong>$${jbTotal(side).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</strong>`;
  });
  updateJbSavings();
}

function updateJbSavings(){
  const ctT=jbTotal('ct'),pcT=jbTotal('cp'),diff=pcT-ctT;
  const savEl=document.getElementById('jb-savings');
  if(!savEl)return;
  if(diff>0){
    savEl.className='jb-savings show';
    savEl.innerHTML=`<span>Contech structures save <strong style="font-weight:600">$${diff.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</strong> in material cost vs. competitor on this project</span><span class="jb-savings-badge">-${pcT>0?((diff/pcT)*100).toFixed(1):0}%</span>`;
  } else if(diff<0){
    savEl.className='jb-savings show';
    savEl.style.background='var(--color-background-secondary)';
    savEl.style.borderColor='var(--color-border-tertiary)';
    savEl.innerHTML=`<span style="color:var(--color-text-primary)">Competitor structures are $${Math.abs(diff).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})} less than Contech</span>`;
  } else {
    savEl.className='jb-savings';
  }
}

function openInNewTab(html, title){
  try {
    const blob = new Blob([html], {type: 'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
  } catch(e) {
    alert('Could not open the page. Error: ' + e.message);
  }
}

function diamTableRows(side){
  return S.diam[side].filter(r=>r.d||r.c||r.lf).map(r=>{
    const matSub=(r.c||0)*(r.lf||0);
    return {d:r.d||'—',c:r.c||0,lf:r.lf||0,matSub,tot:matSub};
  });
}

      ${pcJbT>0?`<div class="sum-row"><span class="sum-lbl">Structures & fittings</span><span class="sum-val">\$${pcJbT.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</span></div>`:''}
      <div class="sum-row"><span class="sum-lbl">Total project length</span><span class="sum-val">${cpLF.toLocaleString()} LF</span></div>
      ${cpDays?`<div class="sum-row"><span class="sum-lbl">Est. install time</span><span class="sum-val${!ctW?' win-val':''}">${cpDays} days @ ${S.instRateCp} LF/day</span></div>`:''}
      <div class="sum-total"><span>Total project cost</span><span class="${!ctW?'win-val':''}" style="font-size:20px;font-weight:800">\$${cpProjTotal.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:5px;margin-top:2px;font-size:11px;color:var(--color-text-secondary)"><span>Blended cost per linear foot</span><span style="font-weight:700;color:${!ctW?'#0C447C':'var(--color-text-primary)'}">$${cp.toFixed(2)}/LF</span></div></div>
  </div>`;

  const bars=`<div class="bars">
    <div class="bar-row"><div class="bar-lbl"><span>Contech ${S.product}</span><span>\$${ct.toFixed(2)}/LF</span></div><div class="bar-track"><div class="bar-fill bar-ct" style="width:${Math.round((ct/maxV)*100)}%"></div></div></div>
    <div class="bar-row"><div class="bar-lbl"><span>${S.compName} ${S.compProduct}</span><span>\$${cp.toFixed(2)}/LF</span></div><div class="bar-track"><div class="bar-fill bar-cp" style="width:${Math.round((cp/maxV)*100)}%"></div></div></div>
  </div>`;

  const projT2=`<div class="proj-totals">
      <div><div class="proj-tot-lbl">Contech ${S.product} total project cost</div><div class="proj-tot-val${ctW?' win-val':''}">\$${ctProjTotal.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</div></div>
      <div><div class="proj-tot-lbl">${cpLabel} total project cost</div><div class="proj-tot-val${!ctW?' win-val':''}">\$${cpProjTotal.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</div></div>
      ${Math.abs(ctProjTotal-cpProjTotal)>0?`<div style="grid-column:1/-1"><div class="proj-tot-lbl">${ctProjTotal<=cpProjTotal?'Total project savings with Contech':'Additional total project cost vs. competitor'}</div><div class="proj-tot-val${ctProjTotal<=cpProjTotal?' win-val':' lose-val'}">\$${Math.abs(ctProjTotal-cpProjTotal).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</div></div>`:''}
    </div>`;

  const details=`<div class="divider"></div><div class="lbl" style="margin-bottom:8px">Project details</div>
    <table class="detail-tbl">
      ${S.projName?`<tr><td>Project name</td><td>${S.projName}</td></tr>`:''}
        ${(S.projCity||S.projState)?`<tr><td>Location</td><td>${[S.projCity,S.projState].filter(Boolean).join(', ')}</td></tr>`:''}
      <tr><td>Application</td><td>${S.appType}</td></tr>
      <tr><td>Project type</td><td>${S.projType}</td></tr>
      <tr><td>Geography reference</td><td>${geoName}</td></tr>
      <tr><td>Install benchmark used</td><td style="font-weight:400;color:var(--color-text-secondary)">${chipSel}</td></tr>
      <tr><td>Contech backfill type</td><td style="font-weight:400;color:var(--color-text-secondary)">${bfTypeCtLbl}${S.backfill.ctType==='rcc'&&S.backfill.ctRebar?' + rebar':''}</td></tr>
      <tr><td>Competitor backfill type</td><td style="font-weight:400;color:var(--color-text-secondary)">${bfTypeCpLbl}${S.backfill.cpType==='rcc'&&S.backfill.cpRebar?' + rebar':''}</td></tr>
      ${S.instRateCt>0?`<tr><td>Contech install rate</td><td>${S.instRateCt} LF/day${ctDays?' ('+ctDays+' days)':''}</td></tr>`:''}
      ${S.instRateCp>0?`<tr><td>Competitor install rate</td><td>${S.instRateCp} LF/day${cpDays?' ('+cpDays+' days)':''}</td></tr>`:''}
      ${S.dailyRate>0?`<tr><td>Daily overhead rate</td><td>$${S.dailyRate.toLocaleString()}/day</td></tr>`:''}
      ${schedVal&&schedVal!==0?`<tr><td>Schedule ${schedVal>0?'savings':'cost advantage'}</td><td style="font-weight:600;color:${schedVal>0?'#0C447C':'#a32d2d'}">$${Math.abs(schedVal).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})} (${Math.abs(dayDiff)} days × $${S.dailyRate.toLocaleString()}/day)</td></tr>`:''}
    </table>
    <div class="disclaimer-block">
      <div class="disclaimer-title">Disclaimer</div>
      The non-material cost inputs in this comparison — including excavation and trenching, backfill, installation labor, and equipment — were estimated to the best of Contech's knowledge based on regional benchmarks and typical project conditions. These figures are intended as directional planning estimates only and will vary based on site-specific conditions, contractor rates, and local market pricing. Material costs reflect pricing provided at the time of preparation. Contech Engineered Solutions makes no warranty, express or implied, regarding the accuracy or completeness of this analysis. This comparison can be easily rerun at any time with customer-supplied cost data — contact your Contech representative to update inputs.
    </div>`;

  document.getElementById('v-results').innerHTML=`<div class="card">
    ${banner}${statGrid}${schedNote}${sumGrid}${diamSection}${rcbSummaryBlock}${jbBlock2}${carbonBlock}${details}
    <div class="action-row">
      <button class="btn-pdf" onclick="printSummary()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="1" width="10" height="12" rx="1.5" stroke="#fff" stroke-width="1.2"/><path d="M4 5h6M4 7.5h6M4 10h4" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/></svg>
        Print / Save as PDF
      </button>
      <button class="btn-pdf" style="background:#2d6e3e;border-color:#2d6e3e" onclick="exportContractorForm()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="1" width="11" height="12" rx="1.5" stroke="#fff" stroke-width="1.2"/><path d="M4 4h6M4 6.5h6M4 9h3M9 8.5l2 2-2 2" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Export Contractor Form
      </button>
      <button class="btn-pdf" style="background:#3d3d3d;border-color:#3d3d3d" onclick="showInternalCompare()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7s2.2-4 6-4 6 4 6 4-2.2 4-6 4-6-4-6-4z" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/><circle cx="7" cy="7" r="1.8" stroke="#fff" stroke-width="1.2"/></svg>
        Internal Comparison
      </button>
      <button class="btn-pdf" id="save-est-btn" style="background:#6b4a9e;border-color:#6b4a9e" onclick="saveEstimate()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2h8l2 2v8H2V2z" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/><path d="M4 2v3h5V2M4 12V8h6v4" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/></svg>
        Save Estimate
      </button>
      <button class="btn" onclick="showView(isStormSewer()?'jbox':'costs');isStormSewer()?rJBox():rCosts()">‹ Edit inputs</button>
      <button class="btn" onclick="reset()">Start new comparison</button>
    </div></div>`;

  showView('results');
  setTimeout(()=>document.getElementById('v-results').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function reset(){
  S={product:null,compName:'',compProduct:'',appType:'',projType:'',projName:'',projCity:'',projState:'',geo:null,installChip:null,
    visibleDiamLines:1,
    diam:{ct:newDiamRows(),cp:newDiamRows()},
    exc:{ct:0,cp:0},inst:{ct:0,cp:0},instRateCt:0,instRateCp:0,dailyRate:0,spoils:{swell:25,truckCY:14,haulPerLoad:0,mode:'load',haulPerCY:0},
  rcbLines:Array.from({length:15},()=>({cmpBarrels:1,cmpSpacing:0,cmpBedding:null,cmpWorkRoom:18,cmpCover:null,ctManning:0,cpBarrels:1,cpSpacing:0,cpBedding:null,cpWorkRoom:18,cpCover:null,cpManning:0,runs:1,runSpacing:0,bedding:12,workRoom:18,rcbCover:0,span:0,rise:0,wall:6,topSlab:6,botSlab:6,haunch:12,collapsed:true})),
    backfill:{ctType:'',ctCost:0,ctRebar:false,ctRebarCost:REBAR_SUGGESTED_COST,cpType:'',cpCost:0,cpRebar:false,cpRebarCost:REBAR_SUGGESTED_COST},
    jb:{ctUnit:0,ctQty:0,pcUnit:0,pcQty:0},
    fit:{ct:newFit(),cp:newFit()},
    rcb:{span:0,rise:0,wall:4,topSlab:4,botSlab:4,haunch:4,runs:1,runSpacing:0,bedding:12,workRoom:18,
         cmpDiam:0,cmpBarrels:1,cmpSpacing:0,cmpBedding:12,cmpWorkRoom:18,rcbCover:0,cmpCover:0,rcbFootage:0,cmpFootage:0,cpDiam:0,cpBarrels:1,cpSpacing:0,cpBedding:12,cpWorkRoom:18,cpCover:0,ctManning:0,cpManning:0}};
  _lastSummaryHTML='';
  if(!reset._skipRender){showView('product');rProduct();}
}

document.getElementById('hdr-logo').src=CONTECH_LOGO;
rProduct();
</script>
